<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BEDRE</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- PRE HEADER -->
<div class="pre-header">
  <span>Find a Store</span>
  <span>Help</span>
  <span>Join Us</span>
  <span>Sign In</span>
</div>

<!-- HEADER -->
<header class="header">
  <div class="logo">BEDRE</div>

  <nav class="nav">
    <a href="#">New & Featured</a>
    <a href="#">Men</a>
    <a href="#">Women</a>
    <a href="#">Sale</a>
  </nav>

  <div class="actions">
    <input id="searchInput" aria-label="Search products" placeholder="Search"/>
    <div id="searchResults" class="search-results" role="listbox"></div>

    <button id="cartBtn" aria-label="Open cart">
      🛍️ <span id="cartCount">0</span>
    </button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <p>First Look</p>
    <h1>BEDRE APEX PRO</h1>
    <button>Shop</button>
  </div>
</section>

<!-- PRODUCT ROWS -->
<section class="scroll-section">
  <h2>Trending Men's</h2>
  <div id="menRow" class="scroll-row"></div>
</section>

<section class="scroll-section">
  <h2>Trending Women's</h2>
  <div id="womenRow" class="scroll-row"></div>
</section>

<!-- PROMO -->
<section class="promo">
  <div class="promo-content">
    <h1>BEDRE LUNA</h1>
    <button class="white-btn">Shop Now</button>
  </div>
</section>

<!-- CATEGORIES -->
<section class="categories">
  <div class="category" data-cat="Running">Running</div>
  <div class="category" data-cat="Lifestyle">Lifestyle</div>
  <div class="category" data-cat="Casual">Casual</div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-grid">
    <div><h4>Find a Store</h4></div>
    <div><h4>Get Help</h4></div>
    <div><h4>About Bedre</h4></div>
  </div>
  <p class="legal">© 2026 Bedre</p>
</footer>

<!-- OVERLAYS -->
<div id="overlay" class="overlay"></div>

<div id="productModal" class="modal" role="dialog"></div>
<div id="categoryModal" class="modal"></div>
<div id="checkoutModal" class="modal"></div>

<div id="cartPanel" class="cart-panel"></div>

<script src="script.js"></script>
</body>
</html>
