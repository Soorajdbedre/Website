<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BEDRE</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- PRE HEADER -->
<div class="pre-header">
  <span>Find a Store</span>
  <span>Help</span>
  <span>Join Us</span>
  <span>Sign In</span>
</div>

<!-- HEADER -->
<header class="header">
  <div class="logo">BEDRE</div>

  <nav class="nav">
    <a>New & Featured</a>
    <a>Men</a>
    <a>Women</a>
    <a>Sale</a>
  </nav>

  <div class="actions">
    <input type="text" id="searchInput" placeholder="Search"/>
    <span id="cartIcon">🛍️ <span id="cartCount">0</span></span>
    <div id="searchResults" class="search-results"></div>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <p>First Look</p>
    <h1>BEDRE APEX PRO</h1>
    <button>Shop</button>
  </div>
</section>

<!-- MEN -->
<section class="scroll-section">
  <h2>Trending Men's</h2>
  <div class="scroll-row" id="menRow"></div>
</section>

<!-- WOMEN -->
<section class="scroll-section">
  <h2>Trending Women's</h2>
  <div class="scroll-row" id="womenRow"></div>
</section>

<!-- PROMO -->
<section class="promo">
  <div class="promo-content">
    <h1>BEDRE LUNA</h1>
    <button class="white-btn">Shop Now</button>
  </div>
</section>

<!-- CATEGORIES -->
<section class="categories">
  <div class="category" data-cat="Running">Running</div>
  <div class="category" data-cat="Lifestyle">Lifestyle</div>
  <div class="category" data-cat="Casual">Casual</div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-grid">
    <div>
      <h4>Find a Store</h4>
      <p>Store Locator</p>
    </div>
    <div>
      <h4>Get Help</h4>
      <p>Order Status</p>
      <p>Returns</p>
    </div>
    <div>
      <h4>About Bedre</h4>
      <p>News</p>
      <p>Careers</p>
    </div>
  </div>
  <p class="legal">© 2026 Bedre</p>
</footer>

<!-- MODALS -->
<div id="productModal" class="modal"></div>
<div id="categoryModal" class="modal"></div>
<div id="checkoutModal" class="modal"></div>

<!-- CART -->
<div id="cartPanel" class="cart-panel"></div>

<script src="script.js"></script>
</body>
</html>
